# Netlify build config — auto-detected on git-connected deploys
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Security headers (defense-in-depth) ────────────────────────────────────
# Static SPA: no backend, no DB, no inline scripts. CSP locks script execution
# to our own bundle so even a future code regression can't run injected JS.
# style-src needs 'unsafe-inline' because React/framer-motion set inline
# style="" attributes at runtime; script-src stays strict 'self'.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; frame-src 'none'; form-action 'none'; img-src 'self' data:; font-src https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    X-XSS-Protection = "0"
    Cross-Origin-Opener-Policy = "same-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=(), interest-cohort=()"

# Fingerprinted assets are immutable → cache hard for fast repeat visits (mobile).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Serve real files first; fall back to index.html for any other path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
